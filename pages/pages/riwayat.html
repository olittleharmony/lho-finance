<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riwayat — LHO Finance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="page-wrapper">
  <div id="navbar-container"></div>
  <div class="main-content">

    <div class="page-header">
      <div class="page-header-text">
        <h1>Riwayat Transaksi</h1>
        <p>Semua pembayaran kas dan pengajuan reimburse kamu</p>
      </div>
    </div>

    <div class="card">
      <div class="filter-bar">
        <div class="form-group">
          <label>Tipe</label>
          <select id="filter-type" onchange="applyFilter()">
            <option value="">Semua</option>
            <option value="kas">Kas Bulanan</option>
            <option value="reimburse">Reimburse</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="filter-status" onchange="applyFilter()">
            <option value="">Semua</option>
            <option value="pending">Menunggu</option>
            <option value="confirmed">Dikonfirmasi</option>
            <option value="rejected">Ditolak</option>
          </select>
        </div>
        <div class="form-group">
          <label>Periode (Kas)</label>
          <input type="month" id="filter-period" onchange="applyFilter()">
        </div>
        <button class="btn btn-ghost btn-sm" onclick="resetFilter()" style="align-self:flex-end;margin-bottom:0">Reset</button>
      </div>

      <div id="summary-row" style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;padding:14px;background:#f5f5f5;border-radius:8px;font-size:13px">
        <span>Total: <strong id="sum-count">0</strong> transaksi</span>
        <span>Kas masuk: <strong id="sum-kas">Rp 0</strong></span>
        <span>Reimburse: <strong id="sum-reim">Rp 0</strong></span>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Tipe</th>
              <th>Keterangan</th>
              <th>Nominal</th>
              <th>Tanggal</th>
              <th>Status</th>
              <th>Bukti</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr><td colspan="6" style="text-align:center;padding:32px;color:#aaa">Memuat data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../js/config.js"></script>
<script src="../js/supabase.js"></script>
<script src="../js/ui.js"></script>
<script>
  let allPayments = [];

  async function init() {
    const profile = await requireAuth();
    if (!profile) return;
    document.getElementById('navbar-container').innerHTML = renderNavbar(profile, 'riwayat');

    try {
      allPayments = await getMyPayments();
      renderTable(allPayments);
    } catch (err) { showToast(err.message, 'error'); }
  }

  function applyFilter() {
    const type   = document.getElementById('filter-type').value;
    const status = document.getElementById('filter-status').value;
    const period = document.getElementById('filter-period').value;

    let filtered = allPayments;
    if (type)   filtered = filtered.filter(p => p.type === type);
    if (status) filtered = filtered.filter(p => p.status === status);
    if (period) filtered = filtered.filter(p => p.period === period);
    renderTable(filtered);
  }

  function resetFilter() {
    ['filter-type','filter-status','filter-period'].forEach(id => document.getElementById(id).value = '');
    renderTable(allPayments);
  }

  function renderTable(data) {
    const totalKas  = data.filter(p=>p.type==='kas'&&p.status==='confirmed').reduce((s,p)=>s+Number(p.amount),0);
    const totalReim = data.filter(p=>p.type==='reimburse'&&p.status==='confirmed').reduce((s,p)=>s+Number(p.amount),0);
    document.getElementById('sum-count').textContent = data.length;
    document.getElementById('sum-kas').textContent   = formatRupiah(totalKas);
    document.getElementById('sum-reim').textContent  = formatRupiah(totalReim);

    const tbody = document.getElementById('table-body');
    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:32px;color:#aaa">Tidak ada data</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(p => `
      <tr>
        <td>${typeBadge(p.type)}</td>
        <td>
          <div style="font-weight:500">${p.type === 'kas' ? 'Kas ' + formatPeriod(p.period) : p.title}</div>
          ${p.type === 'reimburse' ? `<div style="font-size:12px;color:#888">${p.category}</div>` : ''}
          ${p.review_notes && p.status === 'rejected' ? `<div style="font-size:12px;color:#c62828;margin-top:2px">${p.review_notes}</div>` : ''}
        </td>
        <td style="font-weight:600;white-space:nowrap">${formatRupiah(p.amount)}</td>
        <td style="white-space:nowrap;font-size:13px">${formatDate(p.created_at)}</td>
        <td>${statusBadge(p.status)}</td>
        <td>
          ${p.proof_url
            ? `<a href="${p.proof_url}" target="_blank" class="btn btn-ghost btn-sm">Lihat ↗</a>`
            : '<span style="color:#aaa;font-size:13px">—</span>'}
        </td>
      </tr>
    `).join('');
  }

  init();
</script>
</body>
</html>
