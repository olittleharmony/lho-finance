<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bayar Kas — LHO Finance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .month-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 8px;
    }
    .month-chip {
      padding: 8px 4px;
      border: 1.5px solid var(--gray-2);
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      background: var(--white);
      color: var(--text);
      transition: all .15s;
      user-select: none;
    }
    .month-chip:hover { border-color: #1a1a2e; background: #f5f5f5; }
    .month-chip.selected {
      background: #1a1a2e;
      color: #fff;
      border-color: #1a1a2e;
      font-weight: 500;
    }
    .month-chip.paid {
      background: #e8f5e9;
      color: #2e7d32;
      border-color: #a5d6a7;
      cursor: not-allowed;
    }
    .month-chip.rejected {
      background: #fff8e1;
      color: #e65100;
      border-color: #ffcc80;
    }
    .coverage-bar {
      height: 8px;
      background: #e0e0e0;
      border-radius: 99px;
      overflow: hidden;
      margin-top: 8px;
    }
    .coverage-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .3s, background .3s;
    }
    .warning-box {
      background: #fff3e0;
      border: 1px solid #ffcc80;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: #e65100;
      margin-top: 10px;
      display: none;
    }
    .success-box {
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: #2e7d32;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
<div class="page-wrapper">
  <div id="navbar-container"></div>
  <div class="main-content">

    <div class="page-header">
      <div class="page-header-text">
        <h1>Pembayaran Kas</h1>
        <p>Submit pembayaran kas bulanan kamu</p>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px" id="kas-grid">

      <!-- Form submit -->
      <div class="card">
        <div class="card-header"><h3>Form Pembayaran Baru</h3></div>

        <!-- Pilih tahun -->
        <div class="form-group">
          <label>Tahun</label>
          <select id="kas-year" onchange="renderMonthGrid()"></select>
        </div>

        <!-- Pilih bulan (multi) -->
        <div class="form-group">
          <label>Pilih Bulan <span style="color:#c62828">*</span></label>
          <div id="month-grid" class="month-grid"></div>
          <div style="font-size:12px;color:#888;margin-top:6px">
            Klik bulan untuk memilih. Bulan hijau = sudah lunas.
          </div>
        </div>

        <!-- Nominal -->
        <div class="form-group">
          <label>Nominal Pembayaran <span style="color:#c62828">*</span></label>
          <input type="number" id="kas-amount" placeholder="0" min="0" step="1000"
            oninput="checkCoverage()">
          <div class="form-hint" id="kas-rate-hint">
            Kas per bulan: memuat... · Nominal otomatis terisi saat pilih bulan
          </div>
        </div>

        <!-- Coverage indicator -->
        <div id="coverage-section" style="display:none;margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
            <span>Cakupan pembayaran</span>
            <span id="coverage-label" style="font-weight:600"></span>
          </div>
          <div class="coverage-bar">
            <div class="coverage-fill" id="coverage-fill"></div>
          </div>
          <div class="warning-box" id="warning-box"></div>
          <div class="success-box" id="success-box"></div>
        </div>

        <!-- Upload bukti -->
        <div class="form-group">
          <label>Bukti Pembayaran <span style="color:#c62828">*</span></label>
          <div class="upload-zone" id="upload-zone"
            onclick="document.getElementById('kas-file').click()">
            <input type="file" id="kas-file" accept="image/*,.pdf"
              onchange="handleFileSelect(this)">
            <div class="upload-icon">📎</div>
            <div class="upload-text">Klik atau drag file ke sini</div>
            <div class="upload-sub">JPG, PNG, WEBP, PDF · Maks 10MB</div>
          </div>
          <div id="file-preview" style="display:none" class="upload-preview">
            <span id="file-icon">📄</span>
            <div style="flex:1">
              <div id="file-name" style="font-weight:500"></div>
              <div id="file-size" style="font-size:12px;color:#888"></div>
            </div>
            <button class="btn btn-ghost btn-sm" onclick="clearFile()">✕</button>
          </div>
        </div>

        <div class="form-group">
          <label>Catatan (opsional)</label>
          <textarea id="kas-notes" placeholder="Contoh: Transfer via BCA 12 Apr"></textarea>
        </div>

        <div id="submit-error"
          style="color:#c62828;font-size:13px;margin-bottom:12px;display:none"></div>
        <button class="btn btn-primary btn-block" id="btn-submit" onclick="handleSubmit()">
          Kirim Pembayaran
        </button>
      </div>

      <!-- Riwayat kas -->
      <div class="card">
        <div class="card-header"><h3>Riwayat Kas Kamu</h3></div>
        <div id="kas-history">
          <div class="empty-state"><div class="spinner spinner-dark"></div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script src="../js/config.js"></script>
<script src="../js/supabase.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/gas.js"></script>
<script>
  let profile       = null;
  let selectedFile  = null;
  let kasPerBulan   = 0;
  let selectedMonths = new Set(); // Set of 'YYYY-MM'
  let paidPeriods   = new Set(); // periode yang sudah lunas
  let pendingPeriods = new Set(); // periode yang pending

  const MONTHS = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];

  async function init() {
    profile = await requireAuth();
    if (!profile) return;
    document.getElementById('navbar-container').innerHTML = renderNavbar(profile, 'kas');

    // Populate tahun — mulai dari 2025
    const yearSel  = document.getElementById('kas-year');
    const thisYear = new Date().getFullYear();
    for (let y = 2025; y <= thisYear; y++) {
      const opt = document.createElement('option');
      opt.value = y;
      opt.textContent = y;
      opt.selected = y === thisYear;
      yearSel.appendChild(opt);
    }

    // Ambil setting kas
    try {
      const setting = await getKasSetting();
      kasPerBulan = Number(setting.kas_amount || 0);
      document.getElementById('kas-rate-hint').textContent =
        `Kas per bulan: ${formatRupiah(kasPerBulan)} · Nominal otomatis terisi saat pilih bulan`;
    } catch(e) { console.error(e); }

    // Drag & drop
    const zone = document.getElementById('upload-zone');
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) handleFileSelect({ files: e.dataTransfer.files });
    });

    await loadHistory();
    renderMonthGrid();
  }

  async function loadHistory() {
    try {
      const payments = await getMyPayments('kas');
      paidPeriods.clear();
      pendingPeriods.clear();
      payments.forEach(p => {
        if (p.status === 'confirmed') paidPeriods.add(p.period);
        if (p.status === 'pending')   pendingPeriods.add(p.period);
      });

      const el = document.getElementById('kas-history');
      if (payments.length === 0) {
        el.innerHTML = `<div class="empty-state">
          <div class="empty-icon">📋</div>
          <div class="empty-text">Belum ada riwayat pembayaran kas</div>
        </div>`;
        return;
      }
      el.innerHTML = payments.map(p => `
        <div style="padding:12px 0;border-bottom:1px solid #f0f0f0">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
            <div style="font-weight:600">${formatPeriod(p.period)}</div>
            ${statusBadge(p.status)}
          </div>
          <div style="font-size:13px;color:#555">${formatRupiah(p.amount)}</div>
          <div style="font-size:12px;color:#888;margin-top:2px">
            Dikirim: ${formatDate(p.created_at)}
          </div>
          ${p.status === 'rejected' && p.review_notes ? `
            <div style="font-size:12px;color:#c62828;margin-top:4px;
              padding:6px 10px;background:#ffebee;border-radius:4px">
              Ditolak: ${p.review_notes}
            </div>` : ''}
          ${p.proof_url ? `
            <a href="${p.proof_url}" target="_blank"
              style="font-size:12px;color:#1565c0;margin-top:4px;display:inline-block">
              Lihat bukti ↗
            </a>` : ''}
        </div>
      `).join('');
    } catch(err) { console.error(err); }
  }

  function renderMonthGrid() {
    const year = Number(document.getElementById('kas-year').value);
    const grid = document.getElementById('month-grid');
    selectedMonths.clear();
    checkCoverage();

    // Hitung bulan pertama yang boleh dipilih berdasarkan joined_at
    const joinedAt  = profile.joined_at ? new Date(profile.joined_at) : null;
    const joinYear  = joinedAt ? joinedAt.getFullYear() : 2025;
    const joinMonth = joinedAt ? joinedAt.getMonth() + 1 : 1;

    grid.innerHTML = MONTHS.map((m, i) => {
      const monthNum = i + 1;
      const period   = `${year}-${String(monthNum).padStart(2,'0')}`;
      const isPaid    = paidPeriods.has(period);
      const isPending = pendingPeriods.has(period);

      // Blokir bulan sebelum bergabung
      const isBeforeJoined = joinedAt &&
        (year < joinYear || (year === joinYear && monthNum < joinMonth));

      let cls   = 'month-chip';
      let title = m;
      let tooltip = '';

      if (isBeforeJoined) {
        cls    += ' paid'; // style abu-abu sama seperti paid
        title  += ' —';
        tooltip = 'Sebelum bergabung';
      } else if (isPaid) {
        cls   += ' paid'; title += ' ✓';
        tooltip = 'Sudah lunas';
      } else if (isPending) {
        cls   += ' rejected'; title += ' ⏳';
        tooltip = 'Menunggu konfirmasi';
      }

      const disabled = isPaid || isPending || isBeforeJoined;
      return `<button class="${cls}" data-period="${period}"
        onclick="toggleMonth('${period}', ${disabled})"
        title="${tooltip || period}">
        ${title}
      </button>`;
    }).join('');
  }

  function toggleMonth(period, disabled) {
    if (disabled) return;
    const btn = document.querySelector(`[data-period="${period}"]`);
    if (selectedMonths.has(period)) {
      selectedMonths.delete(period);
      btn.classList.remove('selected');
    } else {
      selectedMonths.add(period);
      btn.classList.add('selected');
    }
    // Auto-fill nominal sesuai jumlah bulan dipilih
    if (kasPerBulan > 0) {
      document.getElementById('kas-amount').value = selectedMonths.size * kasPerBulan;
    }
    checkCoverage();
  }

  function checkCoverage() {
    const nominal  = Number(document.getElementById('kas-amount').value) || 0;
    const nSelected = selectedMonths.size;
    const covSection = document.getElementById('coverage-section');
    const warnBox    = document.getElementById('warning-box');
    const successBox = document.getElementById('success-box');
    const fillEl     = document.getElementById('coverage-fill');
    const labelEl    = document.getElementById('coverage-label');

    if (nSelected === 0 || nominal === 0 || kasPerBulan === 0) {
      covSection.style.display = 'none';
      return;
    }

    covSection.style.display = 'block';
    warnBox.style.display    = 'none';
    successBox.style.display = 'none';

    const maxBulan = Math.floor(nominal / kasPerBulan);
    const pct      = Math.min(100, Math.round((maxBulan / nSelected) * 100));

    fillEl.style.width      = pct + '%';
    fillEl.style.background = maxBulan >= nSelected ? '#2e7d32' : '#e65100';
    labelEl.textContent     = `${maxBulan} dari ${nSelected} bulan tercakup`;
    labelEl.style.color     = maxBulan >= nSelected ? '#2e7d32' : '#e65100';

    if (maxBulan < nSelected) {
      // Ambil bulan yang bisa dicakup (sorted)
      const sortedMonths = [...selectedMonths].sort();
      const covered      = sortedMonths.slice(0, maxBulan);
      const uncovered    = sortedMonths.slice(maxBulan);

      warnBox.style.display = 'block';
      warnBox.innerHTML = `
        <strong>⚠ Pembayaran kas kurang</strong><br>
        Nominal ${formatRupiah(nominal)} hanya cukup untuk
        <strong>${maxBulan} bulan</strong> (@ ${formatRupiah(kasPerBulan)}/bulan).<br>
        ${covered.length > 0 ? `
          Bulan yang ter-cover: <strong>${covered.map(p => formatPeriod(p)).join(', ')}</strong><br>
          Bulan yang tidak ter-cover: <span style="text-decoration:line-through">
            ${uncovered.map(p => formatPeriod(p)).join(', ')}
          </span>
        ` : 'Nominal terlalu kecil untuk membayar bulan manapun.'}
      `;
    } else {
      const lebih = nominal - (nSelected * kasPerBulan);
      successBox.style.display = 'block';
      successBox.innerHTML = `✓ Nominal cukup untuk ${nSelected} bulan yang dipilih.` +
        (lebih > 0 ? ` Kelebihan ${formatRupiah(lebih)} akan dicatat sebagai catatan.` : '');
    }
  }

  function handleFileSelect(input) {
    const file = input.files[0];
    if (!file) return;
    selectedFile = file;
    document.getElementById('file-icon').textContent =
      file.type.startsWith('image/') ? '🖼️' : '📄';
    document.getElementById('file-name').textContent = file.name;
    document.getElementById('file-size').textContent =
      (file.size / 1024).toFixed(1) + ' KB';
    document.getElementById('file-preview').style.display = 'flex';
    document.getElementById('upload-zone').style.display  = 'none';
  }

  function clearFile() {
    selectedFile = null;
    document.getElementById('kas-file').value = '';
    document.getElementById('file-preview').style.display = 'none';
    document.getElementById('upload-zone').style.display  = 'block';
  }

  async function handleSubmit() {
    const nominal = Number(document.getElementById('kas-amount').value);
    const notes   = document.getElementById('kas-notes').value.trim();
    const errEl   = document.getElementById('submit-error');
    const btn     = document.getElementById('btn-submit');
    errEl.style.display = 'none';

    if (selectedMonths.size === 0) {
      errEl.textContent = 'Pilih minimal 1 bulan.';
      errEl.style.display = 'block'; return;
    }
    if (!nominal || nominal <= 0) {
      errEl.textContent = 'Nominal harus lebih dari 0.';
      errEl.style.display = 'block'; return;
    }
    if (!selectedFile) {
      errEl.textContent = 'Bukti pembayaran wajib diunggah.';
      errEl.style.display = 'block'; return;
    }

    const maxBulan = Math.floor(nominal / kasPerBulan);
    if (maxBulan === 0) {
      errEl.textContent = `Nominal terlalu kecil. Minimal ${formatRupiah(kasPerBulan)} untuk 1 bulan.`;
      errEl.style.display = 'block'; return;
    }

    // Ambil bulan yang ter-cover saja
    const sortedMonths = [...selectedMonths].sort();
    const coveredMonths = sortedMonths.slice(0, maxBulan);
    const nominalPerBulan = kasPerBulan;

    setLoading(btn, true, 'Mengunggah bukti...');
    try {
      // Upload bukti sekali → URL sama untuk semua bulan
      const uploaded = await uploadBukti(selectedFile, 'kas', profile.full_name);

      btn.innerHTML = '<span class="spinner"></span>Menyimpan...';

      // Submit satu record per bulan yang ter-cover
      const promises = coveredMonths.map(period =>
        submitPayment({
          type:           'kas',
          period:         period,
          amount:         nominalPerBulan,
          notes:          notes || null,
          proof_url:      uploaded.url,
          proof_filename: uploaded.fileName,
        })
      );
      await Promise.all(promises);

      const uncovered = sortedMonths.slice(maxBulan);
      let msg = `Pembayaran berhasil untuk ${coveredMonths.length} bulan: ` +
        coveredMonths.map(p => formatPeriod(p)).join(', ') + '.';
      if (uncovered.length > 0) {
        msg += ` ${uncovered.length} bulan tidak ter-cover karena nominal kurang.`;
      }

      showToast(msg, coveredMonths.length === sortedMonths.length ? 'success' : 'warning');
      selectedMonths.clear();
      document.getElementById('kas-amount').value = '';
      document.getElementById('kas-notes').value  = '';
      document.getElementById('coverage-section').style.display = 'none';
      clearFile();
      await loadHistory();
      renderMonthGrid();

    } catch(err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      showToast(err.message, 'error');
    } finally {
      setLoading(btn, false, 'Kirim Pembayaran');
    }
  }

  function checkGrid() {
    const g = document.getElementById('kas-grid');
    if (g) g.style.gridTemplateColumns = window.innerWidth < 700 ? '1fr' : '1fr 1fr';
  }
  window.addEventListener('resize', checkGrid);
  checkGrid();
  init();
</script>
</body>
</html>
