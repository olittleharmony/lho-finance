<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Transaksi — LHO Finance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="page-wrapper">
  <div id="navbar-container"></div>
  <div class="main-content">

    <div class="page-header">
      <div class="page-header-text">
        <h1>Transaksi Manual</h1>
        <p>Catat pengeluaran, pemasukan, transfer, dan honorarium</p>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1.4fr;gap:20px" id="main-grid">

      <!-- Form input -->
      <div class="card">
        <div class="card-header"><h3>Input Transaksi Baru</h3></div>

        <div class="form-group">
          <label>Tipe Transaksi <span style="color:#c62828">*</span></label>
          <select id="trx-type" onchange="onTypeChange()">
            <option value="">— Pilih tipe —</option>
            <option value="pengeluaran">Pengeluaran Operasional</option>
            <option value="pemasukan">Pemasukan Non-Kas</option>
            <option value="transfer">Transfer / Mutasi Rekening</option>
            <option value="honorarium">Honorarium / Gaji</option>
          </select>
        </div>

        <div class="form-group">
          <label>Kategori <span style="color:#c62828">*</span></label>
          <select id="trx-category">
            <option value="">— Pilih tipe dulu —</option>
          </select>
        </div>

        <div class="form-group">
          <label>Judul / Keterangan <span style="color:#c62828">*</span></label>
          <input type="text" id="trx-title" placeholder="Contoh: Sewa GOR untuk latihan April">
        </div>

        <div class="form-group">
          <label>Nominal <span style="color:#c62828">*</span></label>
          <input type="number" id="trx-amount" placeholder="0" min="0" step="1000">
        </div>

        <div class="form-group">
          <label>Tanggal Transaksi <span style="color:#c62828">*</span></label>
          <input type="date" id="trx-date">
        </div>

        <!-- Field tambahan: Transfer -->
        <div id="field-transfer" style="display:none">
          <div class="form-group">
            <label>Dari Rekening</label>
            <input type="text" id="trx-from" placeholder="Contoh: BCA 1234567890">
          </div>
          <div class="form-group">
            <label>Ke Rekening</label>
            <input type="text" id="trx-to" placeholder="Contoh: BRI 0987654321">
          </div>
        </div>

        <!-- Field tambahan: Honorarium -->
        <div id="field-honorarium" style="display:none">
          <div class="form-group">
            <label>Nama Penerima <span style="color:#c62828">*</span></label>
            <input type="text" id="trx-recipient" placeholder="Nama lengkap penerima">
          </div>
          <div class="form-group">
            <label>Keterangan Penerima</label>
            <input type="text" id="trx-recipient-notes" placeholder="Contoh: Pelatih piano, Nov 2025">
          </div>
        </div>

        <div class="form-group">
          <label>Catatan</label>
          <textarea id="trx-notes" placeholder="Keterangan tambahan..."></textarea>
        </div>

        <div class="form-group">
          <label>Bukti Transaksi (opsional)</label>
          <div class="upload-zone" id="upload-zone" onclick="document.getElementById('trx-file').click()">
            <input type="file" id="trx-file" accept="image/*,.pdf" onchange="handleFileSelect(this)">
            <div class="upload-icon">📎</div>
            <div class="upload-text">Upload nota atau bukti transfer</div>
            <div class="upload-sub">JPG, PNG, PDF · Maks 10MB</div>
          </div>
          <div id="file-preview" style="display:none" class="upload-preview">
            <span id="file-icon">📄</span>
            <div style="flex:1"><div id="file-name" style="font-weight:500"></div><div id="file-size" style="font-size:12px;color:#888"></div></div>
            <button class="btn btn-ghost btn-sm" onclick="clearFile()">✕</button>
          </div>
        </div>

        <div id="submit-error" style="color:#c62828;font-size:13px;margin-bottom:12px;display:none"></div>
        <button class="btn btn-primary btn-block" id="btn-submit" onclick="handleSubmit()">
          Simpan Transaksi
        </button>
      </div>

      <!-- Riwayat transaksi -->
      <div class="card">
        <div class="card-header">
          <h3>Riwayat Transaksi</h3>
          <div style="display:flex;gap:8px">
            <select id="hist-filter" onchange="filterHistory()" style="font-size:13px;padding:4px 8px">
              <option value="">Semua Tipe</option>
              <option value="pengeluaran">Pengeluaran</option>
              <option value="pemasukan">Pemasukan</option>
              <option value="transfer">Transfer</option>
              <option value="honorarium">Honorarium</option>
            </select>
          </div>
        </div>
        <div id="history-list">
          <div class="empty-state"><div class="spinner spinner-dark"></div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script src="../js/config.js"></script>
<script src="../js/supabase.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/gas.js"></script>
<script>
  let profile = null;
  let selectedFile = null;
  let allTransaksi = [];

  const CATEGORIES = {
    pengeluaran: ['Sewa tempat','Alat musik','Operasional','Konsumsi','Dokumentasi','Lain-lain'],
    pemasukan:   ['Sponsor','Donasi','Tiket konser','Subsidi','Iuran kegiatan','Lain-lain'],
    transfer:    ['Transfer antar rekening','Kas masuk ke bank','Kas keluar dari bank'],
    honorarium:  ['Pelatih','Dirigen','Musisi tamu','Staf produksi','Lain-lain'],
  };

  async function init() {
    profile = await requireAuth('admin');
    if (!profile) return;
    document.getElementById('navbar-container').innerHTML = renderNavbar(profile, 'admin-transaksi');
    document.getElementById('trx-date').value = new Date().toISOString().split('T')[0];

    const zone = document.getElementById('upload-zone');
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) handleFileSelect({ files: e.dataTransfer.files });
    });

    await loadHistory();
  }

  function onTypeChange() {
    const type = document.getElementById('trx-type').value;
    const catSel = document.getElementById('trx-category');
    catSel.innerHTML = '<option value="">— Pilih kategori —</option>';

    if (type && CATEGORIES[type]) {
      CATEGORIES[type].forEach(c => {
        catSel.innerHTML += `<option value="${c}">${c}</option>`;
      });
    }

    document.getElementById('field-transfer').style.display   = type === 'transfer'   ? '' : 'none';
    document.getElementById('field-honorarium').style.display = type === 'honorarium' ? '' : 'none';
  }

  function handleFileSelect(input) {
    const file = input.files[0];
    if (!file) return;
    selectedFile = file;
    document.getElementById('file-icon').textContent = file.type.startsWith('image/') ? '🖼️' : '📄';
    document.getElementById('file-name').textContent = file.name;
    document.getElementById('file-size').textContent = (file.size/1024).toFixed(1) + ' KB';
    document.getElementById('file-preview').style.display = 'flex';
    document.getElementById('upload-zone').style.display = 'none';
  }

  function clearFile() {
    selectedFile = null;
    document.getElementById('trx-file').value = '';
    document.getElementById('file-preview').style.display = 'none';
    document.getElementById('upload-zone').style.display = 'block';
  }

  async function handleSubmit() {
    const type      = document.getElementById('trx-type').value;
    const category  = document.getElementById('trx-category').value;
    const title     = document.getElementById('trx-title').value.trim();
    const amount    = Number(document.getElementById('trx-amount').value);
    const date      = document.getElementById('trx-date').value;
    const notes     = document.getElementById('trx-notes').value.trim();
    const errEl     = document.getElementById('submit-error');
    const btn       = document.getElementById('btn-submit');
    errEl.style.display = 'none';

    if (!type)   { errEl.textContent='Tipe wajib dipilih.'; errEl.style.display='block'; return; }
    if (!title)  { errEl.textContent='Keterangan wajib diisi.'; errEl.style.display='block'; return; }
    if (!amount) { errEl.textContent='Nominal harus lebih dari 0.'; errEl.style.display='block'; return; }
    if (!date)   { errEl.textContent='Tanggal wajib diisi.'; errEl.style.display='block'; return; }
    if (type === 'honorarium' && !document.getElementById('trx-recipient').value.trim()) {
      errEl.textContent='Nama penerima wajib diisi untuk honorarium.'; errEl.style.display='block'; return;
    }

    setLoading(btn, true, 'Menyimpan...');
    try {
      let proofUrl = null, proofFilename = null;
      if (selectedFile) {
        btn.innerHTML = '<span class="spinner"></span>Upload bukti...';
        const uploaded = await uploadBukti(selectedFile, type, profile.full_name);
        proofUrl = uploaded.url;
        proofFilename = uploaded.fileName;
      }

      btn.innerHTML = '<span class="spinner"></span>Menyimpan...';
      await insertTransaction({
        type, category: category || null, title, amount, transaction_date: date,
        notes: notes || null,
        proof_url: proofUrl, proof_filename: proofFilename,
        from_account:     type === 'transfer'   ? document.getElementById('trx-from').value.trim() || null : null,
        to_account:       type === 'transfer'   ? document.getElementById('trx-to').value.trim() || null : null,
        recipient_name:   type === 'honorarium' ? document.getElementById('trx-recipient').value.trim() : null,
        recipient_notes:  type === 'honorarium' ? document.getElementById('trx-recipient-notes').value.trim() || null : null,
      });

      showToast('Transaksi berhasil disimpan!', 'success');
      // Reset form
      ['trx-type','trx-category','trx-title','trx-amount','trx-notes','trx-from','trx-to','trx-recipient','trx-recipient-notes']
        .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
      document.getElementById('trx-date').value = new Date().toISOString().split('T')[0];
      document.getElementById('field-transfer').style.display = 'none';
      document.getElementById('field-honorarium').style.display = 'none';
      clearFile();
      await loadHistory();
    } catch(err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      showToast(err.message, 'error');
    } finally {
      setLoading(btn, false, 'Simpan Transaksi');
    }
  }

  async function loadHistory() {
    try {
      allTransaksi = await getAllTransactions({});
      filterHistory();
    } catch(err) { console.error(err); }
  }

  function filterHistory() {
    const type = document.getElementById('hist-filter').value;
    const data = type ? allTransaksi.filter(t => t.type === type) : allTransaksi;
    const el   = document.getElementById('history-list');

    if (data.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Belum ada transaksi</div></div>`;
      return;
    }

    // Summary baris atas
    const totalIn  = data.filter(t => t.type === 'pemasukan').reduce((s,t) => s+Number(t.amount), 0);
    const totalOut = data.filter(t => t.type !== 'pemasukan').reduce((s,t) => s+Number(t.amount), 0);

    el.innerHTML = `
      <div style="display:flex;gap:12px;margin-bottom:14px;font-size:13px">
        <span style="background:#e8f5e9;color:#2e7d32;padding:4px 10px;border-radius:6px">
          Masuk: ${formatRupiah(totalIn)}
        </span>
        <span style="background:#ffebee;color:#c62828;padding:4px 10px;border-radius:6px">
          Keluar: ${formatRupiah(totalOut)}
        </span>
      </div>
      ${data.map(t => `
      <div style="padding:12px 0;border-bottom:1px solid #f0f0f0">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px">
              ${typeBadge(t.type)}
              ${t.category ? `<span style="font-size:12px;color:#888">${t.category}</span>` : ''}
            </div>
            <div style="font-size:14px;font-weight:600">${t.title}</div>
            ${t.recipient_name ? `<div style="font-size:12px;color:#555">Penerima: ${t.recipient_name}${t.recipient_notes ? ' — '+t.recipient_notes : ''}</div>` : ''}
            ${t.from_account || t.to_account ? `<div style="font-size:12px;color:#555">${t.from_account || '?'} → ${t.to_account || '?'}</div>` : ''}
            <div style="font-size:12px;color:#aaa;margin-top:2px">
              ${formatDateOnly(t.transaction_date)} · oleh ${t.profiles?.full_name || '—'}
            </div>
            ${t.notes ? `<div style="font-size:12px;color:#888;font-style:italic">"${t.notes}"</div>` : ''}
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:15px;font-weight:700;color:${t.type==='pemasukan'?'#2e7d32':'#c62828'}">
              ${t.type==='pemasukan'?'+':'−'}${formatRupiah(t.amount)}
            </div>
            ${t.proof_url ? `<a href="${t.proof_url}" target="_blank" class="btn btn-ghost btn-sm" style="margin-top:4px">Bukti ↗</a>` : ''}
          </div>
        </div>
      </div>`).join('')}`;
  }

  function checkGrid() {
    const g = document.getElementById('main-grid');
    if (g) g.style.gridTemplateColumns = window.innerWidth < 700 ? '1fr' : '1fr 1.4fr';
  }
  window.addEventListener('resize', checkGrid);
  checkGrid();
  init();
</script>
</body>
</html>
