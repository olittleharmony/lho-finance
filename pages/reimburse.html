<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reimburse — LHO Finance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="page-wrapper">
  <div id="navbar-container"></div>
  <div class="main-content">

    <div class="page-header">
      <div class="page-header-text">
        <h1>Pengajuan Reimburse</h1>
        <p>Ajukan penggantian biaya yang sudah kamu keluarkan untuk kegiatan LHO</p>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px" id="reim-grid">

      <!-- Form -->
      <div class="card">
        <div class="card-header"><h3>Form Pengajuan Baru</h3></div>

        <div class="form-group">
          <label>Judul Keperluan <span style="color:#c62828">*</span></label>
          <input type="text" id="reim-title" placeholder="Contoh: Beli pita partisi untuk konser">
        </div>

        <div class="form-group">
          <label>Kategori <span style="color:#c62828">*</span></label>
          <select id="reim-category">
            <option value="">— Pilih kategori —</option>
            <option value="konsumsi">Konsumsi</option>
            <option value="transportasi">Transportasi</option>
            <option value="perlengkapan">Perlengkapan / Alat</option>
            <option value="dokumentasi">Dokumentasi</option>
            <option value="lain-lain">Lain-lain</option>
          </select>
        </div>

        <div class="form-group">
          <label>Nominal <span style="color:#c62828">*</span></label>
          <input type="number" id="reim-amount" placeholder="0" min="0" step="1000">
          <div class="form-hint">Masukkan angka tanpa titik/koma</div>
        </div>

        <div class="form-group">
          <label>Tanggal Pengeluaran <span style="color:#c62828">*</span></label>
          <input type="date" id="reim-date">
        </div>

        <div class="form-group">
          <label>Bukti / Nota <span style="color:#c62828">*</span></label>
          <div class="upload-zone" id="upload-zone" onclick="document.getElementById('reim-file').click()">
            <input type="file" id="reim-file" accept="image/*,.pdf" onchange="handleFileSelect(this)">
            <div class="upload-icon">📎</div>
            <div class="upload-text">Foto nota atau struk belanja</div>
            <div class="upload-sub">JPG, PNG, WEBP, PDF · Maks 10MB</div>
          </div>
          <div id="file-preview" style="display:none" class="upload-preview">
            <span id="file-icon">📄</span>
            <div style="flex:1">
              <div id="file-name" style="font-weight:500"></div>
              <div id="file-size" style="font-size:12px;color:#888"></div>
            </div>
            <button class="btn btn-ghost btn-sm" onclick="clearFile()">✕</button>
          </div>
        </div>

        <div class="form-group">
          <label>Catatan Tambahan</label>
          <textarea id="reim-notes" placeholder="Keterangan tambahan jika diperlukan"></textarea>
        </div>

        <div id="submit-error" style="color:#c62828;font-size:13px;margin-bottom:12px;display:none"></div>
        <button class="btn btn-gold btn-block" id="btn-submit" onclick="handleSubmit()">
          Ajukan Reimburse
        </button>
      </div>

      <!-- Riwayat -->
      <div class="card">
        <div class="card-header"><h3>Riwayat Reimburse</h3></div>
        <div id="reim-history">
          <div class="empty-state"><div class="spinner spinner-dark"></div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script src="../js/config.js"></script>
<script src="../js/supabase.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/gas.js"></script>
<script>
  let profile = null;
  let selectedFile = null;

  async function init() {
    profile = await requireAuth();
    if (!profile) return;
    document.getElementById('navbar-container').innerHTML = renderNavbar(profile, 'reimburse');
    document.getElementById('reim-date').value = new Date().toISOString().split('T')[0];

    const zone = document.getElementById('upload-zone');
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) handleFileSelect({ files: e.dataTransfer.files });
    });

    await loadHistory();
  }

  function handleFileSelect(input) {
    const file = input.files[0];
    if (!file) return;
    selectedFile = file;
    document.getElementById('file-icon').textContent = file.type.startsWith('image/') ? '🖼️' : '📄';
    document.getElementById('file-name').textContent = file.name;
    document.getElementById('file-size').textContent = (file.size/1024).toFixed(1) + ' KB';
    document.getElementById('file-preview').style.display = 'flex';
    document.getElementById('upload-zone').style.display = 'none';
  }

  function clearFile() {
    selectedFile = null;
    document.getElementById('reim-file').value = '';
    document.getElementById('file-preview').style.display = 'none';
    document.getElementById('upload-zone').style.display = 'block';
  }

  async function handleSubmit() {
    const title    = document.getElementById('reim-title').value.trim();
    const category = document.getElementById('reim-category').value;
    const amount   = Number(document.getElementById('reim-amount').value);
    const date     = document.getElementById('reim-date').value;
    const notes    = document.getElementById('reim-notes').value.trim();
    const errEl    = document.getElementById('submit-error');
    const btn      = document.getElementById('btn-submit');
    errEl.style.display = 'none';

    if (!title)    { errEl.textContent='Judul keperluan wajib diisi.'; errEl.style.display='block'; return; }
    if (!category) { errEl.textContent='Kategori wajib dipilih.'; errEl.style.display='block'; return; }
    if (!amount || amount <= 0) { errEl.textContent='Nominal harus lebih dari 0.'; errEl.style.display='block'; return; }
    if (!date)     { errEl.textContent='Tanggal pengeluaran wajib diisi.'; errEl.style.display='block'; return; }
    if (!selectedFile) { errEl.textContent='Bukti/nota wajib diunggah.'; errEl.style.display='block'; return; }

    setLoading(btn, true, 'Mengunggah bukti...');
    try {
      const uploaded = await uploadBukti(selectedFile, 'reimburse', profile.full_name);

      btn.innerHTML = '<span class="spinner"></span>Menyimpan...';
      await submitPayment({
        type:           'reimburse',
        title,
        category,
        amount,
        expense_date:   date,
        notes:          notes || null,
        proof_url:      uploaded.url,
        proof_filename: uploaded.fileName,
      });

      showToast('Reimburse berhasil diajukan! Menunggu persetujuan admin.', 'success');
      // Reset form
      ['reim-title','reim-amount','reim-notes'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('reim-category').value = '';
      document.getElementById('reim-date').value = new Date().toISOString().split('T')[0];
      clearFile();
      await loadHistory();

    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      showToast(err.message, 'error');
    } finally {
      setLoading(btn, false, 'Ajukan Reimburse');
    }
  }

  async function loadHistory() {
    try {
      const payments = await getMyPayments('reimburse');
      const el = document.getElementById('reim-history');
      if (payments.length === 0) {
        el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Belum ada pengajuan reimburse</div></div>`;
        return;
      }
      el.innerHTML = payments.map(p => `
        <div style="padding:12px 0;border-bottom:1px solid #f0f0f0">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
            <div>
              <div style="font-weight:600;font-size:14px">${p.title}</div>
              <div style="font-size:12px;color:#888;margin-top:2px">${p.category} · ${formatDateOnly(p.expense_date)}</div>
            </div>
            ${statusBadge(p.status)}
          </div>
          <div style="font-size:14px;font-weight:600;color:#1a1a2e;margin-top:6px">${formatRupiah(p.amount)}</div>
          <div style="font-size:12px;color:#aaa;margin-top:2px">Diajukan: ${formatDate(p.created_at)}</div>
          ${p.status === 'rejected' && p.review_notes ? `
            <div style="font-size:12px;color:#c62828;margin-top:6px;padding:6px 10px;background:#ffebee;border-radius:4px">
              Ditolak: ${p.review_notes}
            </div>` : ''}
          ${p.proof_url ? `<a href="${p.proof_url}" target="_blank" style="font-size:12px;color:#1565c0;margin-top:4px;display:inline-block">Lihat bukti ↗</a>` : ''}
        </div>
      `).join('');
    } catch(err) { console.error(err); }
  }

  function checkGrid() {
    const g = document.getElementById('reim-grid');
    if (g) g.style.gridTemplateColumns = window.innerWidth < 700 ? '1fr' : '1fr 1fr';
  }
  window.addEventListener('resize', checkGrid);
  checkGrid();
  init();
</script>
</body>
</html>
